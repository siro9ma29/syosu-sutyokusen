<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数直線「かくれゼロ作戦」シミュレーター</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: -apple-system, "Hiragino Sans", "Yu Gothic", sans-serif; }

  .number-line { position: relative; height: 160px; min-width: 100%; }
  .axis { position: absolute; top: 70px; left: 0; right: 0; height: 4px; background: #1e3a8a; border-radius: 2px; }
  .tick { position: absolute; top: 70px; transform: translateX(-50%); cursor: default; }
  .tick .tick-line { width: 2px; background: #93c5fd; height: 12px; margin: 0 auto; transform: translateY(-4px); }
  .tick.major .tick-line { width: 3px; height: 26px; background: #1e3a8a; transform: translateY(-11px); }
  .tick.clickable { cursor: pointer; }
  .tick.clickable .tick-line { transition: background 0.15s, height 0.15s; }
  .tick.clickable:hover .tick-line { background: #ef4444; height: 34px; transform: translateY(-15px); }
  .tick-label {
    position: absolute; top: 22px; left: 50%; transform: translateX(-50%);
    font-size: 18px; font-weight: 700; color: #1e3a8a; white-space: nowrap;
    display: flex; align-items: baseline; line-height: 1;
  }
  /* 整数化のために書き足す末尾0 */
  .hidden-zero {
    display: inline-block; opacity: 0; width: 0; overflow: hidden;
    color: #dc2626; transition: opacity 0.5s ease, width 0.5s ease;
  }
  .hidden-zero.revealed { opacity: 1; width: 0.6em; }
  /* 小数点＋整数化されない先頭の0たち（薄くして整数に見せる） */
  .fade-target { display: inline-block; transition: opacity 0.5s ease; }
  .fade-target.faded { opacity: 0.12; }
  .pin {
    position: absolute; top: -28px; left: 50%; transform: translateX(-50%);
    font-size: 30px; animation: dropBounce 0.7s ease;
  }
  @keyframes dropBounce {
    0%{transform:translateX(-50%) translateY(-60px);opacity:0;}
    50%{transform:translateX(-50%) translateY(6px);opacity:1;}
    70%{transform:translateX(-50%) translateY(-6px);}
    85%{transform:translateX(-50%) translateY(3px);}
    100%{transform:translateX(-50%) translateY(0);opacity:1;}
  }
  /* ステップ表示 */
  .step-item {
    flex: 1; text-align: center; padding: 8px 6px; border-radius: 12px;
    font-weight: 800; font-size: 13px; color: #94a3b8; background: #f1f5f9;
    border: 2px solid #e2e8f0; transition: all 0.2s;
  }
  .step-item.active {
    color: #fff; background: #f59e0b; border-color: #d97706;
    box-shadow: 0 3px 0 #b45309; transform: translateY(-1px);
  }
  .step-item.done {
    color: #166534; background: #dcfce7; border-color: #86efac;
  }
  /* ご褒美バッジ */
  .reward-pop { animation: pop 0.5s ease; }
  @keyframes pop {
    0%{transform:scale(0);opacity:0;} 60%{transform:scale(1.25);opacity:1;} 100%{transform:scale(1);}
  }
</style>
</head>
<body class="bg-blue-50 min-h-screen py-6 px-3">

<!-- ============ 画面①：ホーム（タイトル＋レベル選択） ============ -->
<div id="homeScreen" class="max-w-2xl mx-auto bg-white rounded-3xl shadow-xl p-6 sm:p-10">
  <h1 class="text-2xl sm:text-3xl font-extrabold text-blue-900 text-center mb-2">
    🔢 数直線「かくれゼロ作戦」シミュレーター
  </h1>
  <p class="text-center text-slate-500 text-sm mb-2">小数も、整数とおなじ考え方でよめるよ！</p>
  <div class="flex justify-center mb-7">
    <span class="version-badge inline-flex items-center gap-1 text-xs font-bold text-slate-500 bg-slate-100 border border-slate-200 rounded-full px-3 py-1"></span>
  </div>

  <p class="text-center text-lg font-bold text-blue-800 mb-4">レベルをえらんでスタート！</p>

  <div class="grid grid-cols-1 sm:grid-cols-2 gap-4" id="levelButtons">
    <button data-level="1" class="level-start px-5 py-6 rounded-2xl font-extrabold text-lg bg-blue-100 hover:bg-blue-200 text-blue-900 shadow-[0_5px_0_#93c5fd] active:translate-y-1 active:shadow-none transition">
      レベル1<br><span class="text-sm font-bold text-blue-600">整数</span>
    </button>
    <button data-level="2" class="level-start px-5 py-6 rounded-2xl font-extrabold text-lg bg-blue-100 hover:bg-blue-200 text-blue-900 shadow-[0_5px_0_#93c5fd] active:translate-y-1 active:shadow-none transition">
      レベル2<br><span class="text-sm font-bold text-blue-600">0.1のくらい</span>
    </button>
    <button data-level="3" class="level-start px-5 py-6 rounded-2xl font-extrabold text-lg bg-blue-100 hover:bg-blue-200 text-blue-900 shadow-[0_5px_0_#93c5fd] active:translate-y-1 active:shadow-none transition">
      レベル3<br><span class="text-sm font-bold text-blue-600">0.01のくらい</span>
    </button>
    <button data-level="4" class="level-start px-5 py-6 rounded-2xl font-extrabold text-lg bg-blue-100 hover:bg-blue-200 text-blue-900 shadow-[0_5px_0_#93c5fd] active:translate-y-1 active:shadow-none transition">
      レベル4<br><span class="text-sm font-bold text-blue-600">0.001のくらい</span>
    </button>
    <button data-level="5" class="level-start sm:col-span-2 px-5 py-6 rounded-2xl font-extrabold text-lg bg-amber-100 hover:bg-amber-200 text-amber-900 shadow-[0_5px_0_#fcd34d] active:translate-y-1 active:shadow-none transition">
      レベル5 🌟<br><span class="text-sm font-bold text-amber-700">ミックス（小数スタートあり・10問れんぞくでクリア🔥）</span>
    </button>
    <button data-level="6" id="level6Btn" class="level-start hidden sm:col-span-2 px-5 py-6 rounded-2xl font-extrabold text-lg bg-purple-900 hover:bg-purple-800 text-white shadow-[0_5px_0_#581c87] active:translate-y-1 active:shadow-none transition">
      レベル6 🔮 シークレット<br><span class="text-sm font-bold text-purple-200">じぶんの力でさがそう（ヒントなし）</span>
    </button>
  </div>
</div>

<!-- ============ 画面②：プレイ画面 ============ -->
<div id="playScreen" class="hidden max-w-5xl mx-auto bg-white rounded-3xl shadow-xl p-5 sm:p-8">

  <div class="flex items-center justify-between gap-2 mb-4">
    <button id="backBtn" class="px-4 py-2 rounded-xl font-bold text-sm bg-slate-200 hover:bg-slate-300 text-slate-700 shadow-[0_3px_0_#cbd5e1] active:translate-y-0.5 active:shadow-none transition">
      ◀ レベル選択へ
    </button>
    <div id="levelName" class="font-extrabold text-blue-900 text-base sm:text-lg"></div>
    <div class="flex items-center gap-2">
      <span class="version-badge text-xs font-bold text-slate-500 bg-slate-100 border border-slate-200 rounded-full px-2.5 py-1"></span>
      <div id="progress" class="font-bold text-blue-800 text-sm bg-blue-100 rounded-xl px-4 py-2"></div>
    </div>
  </div>

  <!-- 正答数・ご褒美 -->
  <div class="flex items-center justify-center gap-2 mb-3">
    <div id="scoreBox" class="font-bold text-amber-800 text-sm bg-amber-100 rounded-xl px-4 py-2">⭐ 正解 0問</div>
    <div id="rewardBox" class="flex items-center gap-1 text-2xl"></div>
  </div>

  <!-- 出題（常時表示）：読む情報なので濃い紺地＋白文字でボタンと区別 -->
  <div id="quizPrompt" class="text-center text-xl sm:text-2xl font-extrabold text-white bg-blue-900 rounded-2xl py-4 px-4 mb-3 shadow-inner"></div>

  <!-- ステップ表示（レベル2以上） -->
  <div id="stepBar" class="flex gap-2 mb-3 hidden">
    <div id="stepItem1" class="step-item">① 魔法の「0」を書き足そう！</div>
    <div id="stepItem2" class="step-item">② 小数点をかくそう</div>
    <div id="stepItem3" class="step-item">③ 整数でさがそう</div>
  </div>

  <!-- ヒント／メッセージ -->
  <div id="guide" class="text-center text-base font-bold text-blue-800 mb-4"></div>

  <!-- アクションボタン -->
  <div class="flex flex-wrap justify-center gap-3 mb-4" id="actionArea">
    <button id="btnStep1" class="px-5 py-3 rounded-xl font-bold bg-red-500 hover:bg-red-600 text-white shadow-[0_4px_0_#991b1b] active:translate-y-1 active:shadow-none transition disabled:opacity-40 disabled:shadow-none disabled:cursor-not-allowed">
      ① 魔法の「0」を書き足す ✨
    </button>
    <button id="btnStep2" disabled class="px-5 py-3 rounded-xl font-bold bg-slate-300 text-slate-600 shadow-[0_4px_0_#94a3b8] active:translate-y-1 active:shadow-none transition disabled:opacity-40 disabled:shadow-none disabled:cursor-not-allowed">
      ② 小数点をかくす（整数にする）🙈
    </button>
  </div>

  <div class="pb-4 mb-2 border-2 border-dashed border-blue-200 rounded-2xl bg-blue-50/40">
    <div id="numberLine" class="number-line px-8 py-6"></div>
  </div>

  <div id="quizArea" class="hidden text-center mt-4">
    <div id="quizResult" class="min-h-[44px] flex items-center justify-center text-lg font-bold"></div>
  </div>

</div>

<script>
(function () {
  "use strict";

  const APP_VERSION = "v1.3.0";
  const L6_KEY = "kakurezero_level6_unlocked";
  let state = {
    level: 1, startVal: 0, endVal: 20, step: 1, decimals: 0,
    targetVal: 0, quizActive: false, qIndex: 0, qTotal: 5, solved: false,
    correct: 0,   // このレベルでの正解数
    streak: 0,    // 連続正解数（レベル5用）
    streakNeed: 10 // レベル5のクリアに必要な連続正解数
  };

  const LEVEL_NAMES = {
    1: "レベル1（整数）",
    2: "レベル2（0.1のくらい）",
    3: "レベル3（0.01のくらい）",
    4: "レベル4（0.001のくらい）",
    5: "レベル5（ミックス）",
    6: "レベル6（シークレット）"
  };

  // ご褒美：正解数のしきい値とバッジ（レベル1〜4：全5問）
  const REWARDS = [
    { n: 1, emoji: "🌱", msg: "はじめの1問クリア！" },
    { n: 2, emoji: "⭐", msg: "いいちょうし！" },
    { n: 3, emoji: "🎖️", msg: "3問せいかい！メダルゲット！" },
    { n: 4, emoji: "🏅", msg: "あと1問！すごい！" },
    { n: 5, emoji: "🏆", msg: "ぜんもんせいかい！トロフィー！" }
  ];

  // ご褒美：レベル5（連続10問）用
  const REWARDS_L5 = [
    { n: 1, emoji: "🌱", msg: "1問れんぞく！" },
    { n: 2, emoji: "🌿", msg: "2れんぞく！" },
    { n: 3, emoji: "⭐", msg: "3れんぞく！いいちょうし！" },
    { n: 4, emoji: "✨", msg: "4れんぞく！" },
    { n: 5, emoji: "🎖️", msg: "5れんぞく！はんぶん！" },
    { n: 6, emoji: "🔥", msg: "6れんぞく！のってきた！" },
    { n: 7, emoji: "🏅", msg: "7れんぞく！すごい！" },
    { n: 8, emoji: "💎", msg: "8れんぞく！あと2問！" },
    { n: 9, emoji: "👑", msg: "9れんぞく！あと1問！" },
    { n: 10, emoji: "🏆", msg: "10れんぞく！かんぺきクリア！" }
  ];

  // 現在のレベルで使うご褒美テーブル
  function rewardTable() { return (state.level === 5 || state.level === 6) ? REWARDS_L5 : REWARDS; }

  const homeScreen = document.getElementById("homeScreen");
  const playScreen = document.getElementById("playScreen");
  const numberLineEl = document.getElementById("numberLine");
  const guideEl = document.getElementById("guide");
  const quizPromptEl = document.getElementById("quizPrompt");
  const stepBar = document.getElementById("stepBar");
  const stepItem1 = document.getElementById("stepItem1");
  const stepItem2 = document.getElementById("stepItem2");
  const stepItem3 = document.getElementById("stepItem3");
  const btnStep1 = document.getElementById("btnStep1");
  const btnStep2 = document.getElementById("btnStep2");
  const quizArea = document.getElementById("quizArea");
  const quizResult = document.getElementById("quizResult");
  const progressEl = document.getElementById("progress");
  const levelNameEl = document.getElementById("levelName");
  const scoreBox = document.getElementById("scoreBox");
  const rewardBox = document.getElementById("rewardBox");
  const actionArea = document.getElementById("actionArea");
  const levelStartBtns = document.querySelectorAll(".level-start");

  const round = (v, d) => Number(Math.round(Number(v + "e" + d)) + "e-" + d);
  const fmt = (v, d) => v.toFixed(d);
  const toIntString = (v, d) => Math.round(round(v, d) * Math.pow(10, d)).toString();

  // 1問分の設定。level 5 は 2〜4からランダムに選ぶ。
  function buildLevelConfig(level, qIndex) {
    if (level === 1) {
      const ranges = [
        { start: 0, end: 20 }, { start: 0, end: 20 },
        { start: 15, end: 35 }, { start: 100, end: 120 }, { start: 100, end: 120 }
      ];
      const r = ranges[qIndex] || ranges[0];
      const target = r.start + Math.floor(Math.random() * (r.end - r.start - 1)) + 1;
      return { startVal: r.start, endVal: r.end, step: 1, decimals: 0, targetVal: target, majorEvery: 5 };
    }

    // ミックスレベル：小数スタート問題を含む専用生成
    if (level === 5 || level === 6) {
      return buildLevel5Config();
    }

    let useLevel = level;

    if (useLevel === 2) {
      const target = round((Math.floor(Math.random() * 49) + 1) / 10, 1);
      return { startVal: 0, endVal: 5, step: 0.1, decimals: 1, targetVal: target, majorEvery: 10 };
    }
    if (useLevel === 3) {
      const intPart = Math.floor(Math.random() * 5) + 1;
      const decFirst = Math.floor(Math.random() * 7);
      const start = round(intPart + decFirst / 10, 2);
      const end = round(start + 0.3, 2);
      const tickCount = Math.round((end - start) / 0.01);
      const idx = Math.floor(Math.random() * (tickCount - 1)) + 1;
      const target = round(start + idx * 0.01, 2);
      return { startVal: start, endVal: end, step: 0.01, decimals: 2, targetVal: target, majorEvery: 10 };
    }
    // useLevel 4
    const baseDec = Math.floor(Math.random() * 9);
    const start = round(baseDec / 100, 3);
    const end = round(start + 0.05, 3);
    const tickCount = Math.round((end - start) / 0.001);
    const idx = Math.floor(Math.random() * (tickCount - 1)) + 1;
    const target = round(start + idx * 0.001, 3);
    return { startVal: start, endVal: end, step: 0.001, decimals: 3, targetVal: target, majorEvery: 10 };
  }

  // レベル5専用：0.1/0.01/0.001 をミックス。小数スタート問題も含む。
  // 0.01・0.001（小数スタートが映える方）を多めに出題する。
  function buildLevel5Config() {
    // 重み付き抽選：0.1=2, 0.01=4, 0.001=4
    const r = Math.random();
    const kind = r < 0.2 ? 1 : (r < 0.6 ? 2 : 3); // 1=0.1, 2=0.01, 3=0.001

    if (kind === 1) {
      // 0.1のくらい：0スタート or 整数スタート
      const intStart = Math.floor(Math.random() * 4); // 0〜3
      const start = intStart;
      const end = start + 1;
      const idx = Math.floor(Math.random() * 9) + 1; // 1〜9
      const target = round(start + idx * 0.1, 1);
      return { startVal: start, endVal: end, step: 0.1, decimals: 1, targetVal: target, majorEvery: 10 };
    }

    if (kind === 2) {
      // 0.01のくらい：4.2 のような小数スタートを含む
      const intPart = Math.floor(Math.random() * 5) + 1;  // 1〜5
      const decFirst = Math.floor(Math.random() * 10);     // 0〜9 → 4.2 など
      const start = round(intPart + decFirst / 10, 2);
      const end = round(start + 0.1, 2);
      const tickCount = Math.round((end - start) / 0.01); // 10
      const idx = Math.floor(Math.random() * (tickCount - 1)) + 1;
      const target = round(start + idx * 0.01, 2);
      return { startVal: start, endVal: end, step: 0.01, decimals: 2, targetVal: target, majorEvery: 10 };
    }

    // kind === 3 → 0.001のくらい：4.29 のような小数スタートを含む
    const intPart = Math.floor(Math.random() * 5) + 1;   // 1〜5
    const decFirst = Math.floor(Math.random() * 10);      // 0〜9
    const decSecond = Math.floor(Math.random() * 10);     // 0〜9 → 4.29 など
    const start = round(intPart + decFirst / 10 + decSecond / 100, 3);
    const end = round(start + 0.01, 3);
    const tickCount = Math.round((end - start) / 0.001); // 10
    const idx = Math.floor(Math.random() * (tickCount - 1)) + 1;
    const target = round(start + idx * 0.001, 3);
    return { startVal: start, endVal: end, step: 0.001, decimals: 3, targetVal: target, majorEvery: 10 };
  }

  function makeLabelHTML(value, decimals) {
    if (decimals === 0) {
      return '<span class="int-part">' + value + '</span>';
    }
    // レベル6：ステップなし。ふつうに小数を表示する。
    if (state.level === 6) {
      return '<span class="int-part">' + value.toFixed(decimals) + '</span>';
    }
    const s = value.toFixed(decimals);
    const [intPart, decPartFull] = s.split(".");
    const lastDigit = decPartFull.slice(-1);
    const decKeep = decPartFull.slice(0, -1);

    let html = "";
    if (intPart === "0") {
      html += '<span class="fade-target">' + intPart + '</span>';
    } else {
      html += '<span class="int-part">' + intPart + '</span>';
    }
    html += '<span class="fade-target">.</span>';

    let significantSeen = (intPart !== "0");
    for (let k = 0; k < decKeep.length; k++) {
      const ch = decKeep[k];
      if (!significantSeen && ch === "0") {
        html += '<span class="fade-target">' + ch + '</span>';
      } else {
        significantSeen = true;
        html += '<span class="dec-part">' + ch + '</span>';
      }
    }
    html += '<span class="hidden-zero">' + lastDigit + '</span>';
    return html;
  }

  function renderNumberLine() {
    numberLineEl.innerHTML = "";
    const axis = document.createElement("div");
    axis.className = "axis";
    numberLineEl.appendChild(axis);

    const { startVal, endVal, step, decimals, majorEvery } = state;
    const totalTicks = Math.round((endVal - startVal) / step);
    numberLineEl.style.minWidth = "";

    for (let i = 0; i <= totalTicks; i++) {
      const value = round(startVal + i * step, decimals);
      const isMajor = (i % majorEvery === 0);
      const pct = (i / totalTicks) * 100;

      const tick = document.createElement("div");
      tick.className = "tick" + (isMajor ? " major" : "");
      tick.style.left = pct + "%";
      tick.dataset.value = value;

      const line = document.createElement("div");
      line.className = "tick-line";
      tick.appendChild(line);

      if (isMajor) {
        const label = document.createElement("div");
        label.className = "tick-label";
        label.innerHTML = makeLabelHTML(value, decimals);
        tick.appendChild(label);
      }

      tick.addEventListener("click", () => onTickClick(value, tick));
      numberLineEl.appendChild(tick);
    }
    updateClickable();
  }

  function updateClickable() {
    numberLineEl.querySelectorAll(".tick").forEach(t => {
      if (state.quizActive) t.classList.add("clickable");
      else t.classList.remove("clickable");
    });
  }

  function targetDisplay() { return fmt(state.targetVal, state.decimals); }

  function updateProgress() {
    if (state.level === 5) {
      progressEl.textContent = "れんぞく " + state.streak + " / " + state.streakNeed;
    } else {
      progressEl.textContent = "問題 " + (state.qIndex + 1) + " / " + state.qTotal;
    }
    levelNameEl.textContent = LEVEL_NAMES[state.level] || "";
  }

  // ステップ表示の状態を更新（active=今やること, done=おわった）
  // step: 1=魔法の0 を待つ, 2=小数点をかくす を待つ, 3=整数でさがす
  function setStep(step) {
    [stepItem1, stepItem2, stepItem3].forEach(el => el.classList.remove("active", "done"));
    if (step >= 2) stepItem1.classList.add("done");
    if (step >= 3) stepItem2.classList.add("done");
    if (step === 1) stepItem1.classList.add("active");
    if (step === 2) stepItem2.classList.add("active");
    if (step === 3) stepItem3.classList.add("active");
  }

  function updateScore() {
    if (state.level === 5) {
      scoreBox.textContent = "🔥 れんぞく " + state.streak + " / " + state.streakNeed + "問";
    } else {
      scoreBox.textContent = "⭐ 正解 " + state.correct + "問";
    }
    rewardBox.innerHTML = "";
    const table = rewardTable();
    const count = (state.level === 5) ? state.streak : state.correct;
    table.forEach(r => {
      if (count >= r.n) {
        const span = document.createElement("span");
        span.textContent = r.emoji;
        rewardBox.appendChild(span);
      }
    });
  }

  function showHome() { playScreen.classList.add("hidden"); homeScreen.classList.remove("hidden"); }
  function showPlay() { homeScreen.classList.add("hidden"); playScreen.classList.remove("hidden"); }

  function startLevel() {
    state.qIndex = 0;
    state.correct = 0;
    state.streak = 0;
    state.qTotal = (state.level === 5 || state.level === 6) ? 10 : 5;
    updateScore();
    loadProblem();
  }

  function loadProblem() {
    const cfg = buildLevelConfig(state.level, state.qIndex);
    state = Object.assign(state, cfg);
    state.solved = false;

    btnStep2.classList.remove("bg-orange-500", "hover:bg-orange-600", "text-white", "shadow-[0_4px_0_#9a3412]");
    btnStep2.classList.add("bg-slate-300", "text-slate-600", "shadow-[0_4px_0_#94a3b8]");

    renderNumberLine();
    quizResult.innerHTML = "";
    updateProgress();

    // 出題文（常時表示）
    quizPromptEl.innerHTML = "🎯 数直線から <span class='text-amber-300'>" + targetDisplay() + "</span> をさがそう！";

    if (state.level === 1 || state.level === 6) {
      // ステップ・操作ボタンなし：そのままさがす
      stepBar.classList.add("hidden");
      actionArea.classList.add("hidden");
      state.quizActive = true;
      updateClickable();
      quizArea.classList.remove("hidden");
      guideEl.textContent = (state.level === 6)
        ? "🔮 ヒントなし！ 自分の力で目盛りをさがそう 👇"
        : "目盛りをクリックしてさがそう 👇";
    } else {
      // 小数：ステップ＆操作ボタンあり
      stepBar.classList.remove("hidden");
      actionArea.classList.remove("hidden");
      setStep(1);

      btnStep1.disabled = false;
      btnStep2.disabled = true;
      state.quizActive = false;
      updateClickable();
      quizArea.classList.add("hidden");
      guideEl.textContent = "まずは①「魔法の0」を書き足してみよう！";
    }
  }

  btnStep1.addEventListener("click", () => {
    numberLineEl.querySelectorAll(".hidden-zero").forEach(z => z.classList.add("revealed"));
    btnStep1.disabled = true;
    btnStep2.disabled = false;
    btnStep2.classList.remove("bg-slate-300", "text-slate-600", "shadow-[0_4px_0_#94a3b8]");
    btnStep2.classList.add("bg-orange-500", "hover:bg-orange-600", "text-white", "shadow-[0_4px_0_#9a3412]");
    setStep(2);
    guideEl.textContent = "ぜんぶの数の後ろに「0」がついたね！ つぎは②で小数点をかくそう 🙈";
  });

  btnStep2.addEventListener("click", () => {
    numberLineEl.querySelectorAll(".fade-target").forEach(d => d.classList.add("faded"));
    btnStep2.disabled = true;
    state.quizActive = true;
    updateClickable();
    quizArea.classList.remove("hidden");
    setStep(3);
    const intTarget = toIntString(state.targetVal, state.decimals);
    guideEl.innerHTML = "🎉 整数の数直線になったよ！ あとは整数 <span class='text-red-600'>" + intTarget + "</span> をさがすだけ！";
  });

  function onTickClick(value, tickEl) {
    if (!state.quizActive) return;
    const isCorrect = Math.abs(round(value, state.decimals) - state.targetVal) < Math.pow(10, -(state.decimals + 2));
    numberLineEl.querySelectorAll(".pin").forEach(p => p.remove());

    if (isCorrect) {
      const pin = document.createElement("div");
      pin.className = "pin";
      pin.textContent = "📍";
      tickEl.appendChild(pin);
      state.quizActive = false;
      state.solved = true;
      updateClickable();

      // 正解数を増やしてご褒美
      state.correct++;
      state.streak++;
      updateScore();
      const table = rewardTable();
      const reward = table.find(r => r.n === (state.level === 5 ? state.streak : state.correct));
      let rewardMsg = "";
      if (reward) {
        rewardMsg = " <span class='reward-pop inline-block'>" + reward.emoji + " " + reward.msg + "</span>";
      }

      if (state.level === 5) {
        // レベル5：連続正解でクリア判定
        const cleared = (state.streak >= state.streakNeed);
        if (cleared) {
          unlockLevel6();
          quizResult.innerHTML =
            "<span class='text-green-600'>🎊 大正解！ " + targetDisplay() + " はここだ！</span>" + rewardMsg;
          guideEl.innerHTML = "🏆 レベル5 クリア！ <span class='text-red-600'>" +
            state.streakNeed + "問れんぞくせいかい</span>！ 🔮 <span class='text-purple-700'>シークレットのレベル6が解放されたよ！</span> 「レベル選択へ」でもどろう！";
        } else {
          quizResult.innerHTML =
            "<span class='text-green-600'>🎊 大正解！ " + targetDisplay() + " はここだ！</span>" + rewardMsg +
            " <button id='nextBtn' class='ml-2 px-4 py-2 rounded-xl font-bold text-sm bg-green-500 hover:bg-green-600 text-white shadow-[0_3px_0_#15803d] active:translate-y-0.5 active:shadow-none transition'>つぎの問題へ ▶</button>";
          const nextBtn = document.getElementById("nextBtn");
          if (nextBtn) nextBtn.addEventListener("click", () => { state.qIndex++; loadProblem(); });
        }
        return;
      }

      const isLast = (state.qIndex >= state.qTotal - 1);
      if (isLast) {
        const finalReward = table.find(r => r.n === state.correct);
        const fe = finalReward ? finalReward.emoji : "🎉";
        quizResult.innerHTML =
          "<span class='text-green-600'>🎊 大正解！ " + targetDisplay() +
          " はここだ！</span>" + rewardMsg;
        guideEl.innerHTML = fe + " レベル" + state.level + " しゅうりょう！ " + state.qTotal + "問中 <span class='text-red-600'>" +
          state.correct + "問せいかい</span>！ 「レベル選択へ」で次にすすもう！";
      } else {
        quizResult.innerHTML =
          "<span class='text-green-600'>🎊 大正解！ " + targetDisplay() + " はここだ！</span>" + rewardMsg +
          " <button id='nextBtn' class='ml-2 px-4 py-2 rounded-xl font-bold text-sm bg-green-500 hover:bg-green-600 text-white shadow-[0_3px_0_#15803d] active:translate-y-0.5 active:shadow-none transition'>つぎの問題へ ▶</button>";
        const nextBtn = document.getElementById("nextBtn");
        if (nextBtn) nextBtn.addEventListener("click", () => { state.qIndex++; loadProblem(); });
      }
    } else {
      // 不正解：レベル5は連続カウントをリセット
      if (state.level === 5 && state.streak > 0) {
        state.streak = 0;
        updateScore();
      }
      const clickedInt = toIntString(value, state.decimals);
      const clickedDec = fmt(value, state.decimals);
      const streakMsg = (state.level === 5)
        ? " <span class='text-orange-600'>れんぞくは0にもどっちゃった…もう一度この問題からチャレンジ！</span>" : "";
      if (state.decimals === 0) {
        quizResult.innerHTML =
          "<span class='text-red-500'>おしい！そこは「" + clickedDec + "」だよ。</span>" + streakMsg;
      } else {
        quizResult.innerHTML =
          "<span class='text-red-500'>おしい！そこは「" + clickedInt + " (元の " + clickedDec + ")」だよ。</span>" + streakMsg;
      }
    }
  }

  levelStartBtns.forEach(btn => {
    btn.addEventListener("click", () => {
      state.level = parseInt(btn.dataset.level, 10);
      showPlay();
      startLevel();
    });
  });

  document.getElementById("backBtn").addEventListener("click", () => { showHome(); });

  function isLevel6Unlocked() {
    try { return localStorage.getItem(L6_KEY) === "1"; } catch (e) { return false; }
  }
  function unlockLevel6() {
    try { localStorage.setItem(L6_KEY, "1"); } catch (e) {}
    refreshLevel6Button();
  }
  function refreshLevel6Button() {
    const b = document.getElementById("level6Btn");
    if (!b) return;
    if (isLevel6Unlocked()) b.classList.remove("hidden");
    else b.classList.add("hidden");
  }

  // バージョンバッヂを反映
  document.querySelectorAll(".version-badge").forEach(el => { el.textContent = APP_VERSION; });

  refreshLevel6Button();
  showHome();
})();
</script>
</body>
</html>
